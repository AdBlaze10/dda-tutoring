services:
  - type: web
    name: dda-tutoring
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn dda_tutoring.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "dda-tutoring.onrender.com"
